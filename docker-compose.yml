services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.up.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ENV: development
      SERVER_PORT: "8080"
      DB_CONNECTION_STR: postgresql://postgres:postgres@db:5432/taskflow?sslmode=disable
      JWT_SECRET: change-me-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
